<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanzid Private Analyst</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; margin: 0; padding: 0; overflow: hidden; }
        .header { background: #ff0000; color: #fff; padding: 10px; text-align: center; font-weight: bold; font-size: 18px; border-bottom: 2px solid #fff; position: sticky; top: 0; z-index: 100; }
        .timer-bar { background: #1a1a1a; color: #ffcc00; text-align: center; padding: 5px; font-size: 20px; font-weight: bold; border-bottom: 1px solid #333; }
        /* অরিজিনাল সাইট দেখার উইন্ডো */
        .source-container { width: 100%; height: calc(100vh - 100px); overflow: hidden; position: relative; }
        iframe { width: 100%; height: 110%; border: none; position: absolute; top: -50px; } /* সাইটের লোগো লুকাতে একটু উপরে তুলে দেওয়া */
        .footer-action { position: fixed; bottom: 0; width: 100%; background: #000; padding: 10px; text-align: center; border-top: 2px solid #f00; }
        .status { color: #0f0; font-size: 12px; animation: blink 1s infinite; }
        @keyframes blink { 50% { opacity: 0; } }
    </style>
</head>
<body>

<div class="header">SANZID VIP PREDICTION ⚡</div>
<div class="timer-bar" id="sync-timer">SYNCING WITH SERVER...</div>

<div class="source-container">
    <iframe src="https://wingoanalyst.com/#/wingo_1m"></iframe>
</div>

<div class="footer-action">
    <span class="status">● REAL-TIME DATA ACTIVE</span>
    <div style="font-size: 10px; color: #666;">SERVER: WINGO_1M | SOURCE: GLOBAL</div>
</div>

<script>
    function updateTimer() {
        const now = new Date();
        const seconds = 60 - now.getSeconds();
        document.getElementById('sync-timer').innerText = "NEXT SIGNAL IN: " + (seconds < 10 ? "0" + seconds : seconds) + "s";
    }
    setInterval(updateTimer, 1000);
</script>

</body>
</html>
