<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanzid Strict Real-Shot</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        .card { width: 300px; border: 2px solid #222; border-radius: 30px; padding: 25px; background: #050505; box-shadow: 0 0 20px rgba(255,0,0,0.1); }
        .timer { font-size: 50px; font-weight: bold; color: #fff; margin-bottom: 20px; }
        .signal-box { background: #111; padding: 35px 10px; border-radius: 20px; border: 1px solid #333; margin-bottom: 15px; min-height: 80px; display: flex; align-items: center; justify-content: center; }
        .signal-text { font-size: 50px; font-weight: bold; }
        .status-light { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 5px; }
        #log { font-size: 11px; margin-top: 15px; color: #666; font-family: monospace; }
    </style>
</head>
<body>

<div class="card">
    <div style="font-size: 12px; color: #888; margin-bottom: 10px;">
        <span id="light" class="status-badge"></span> SERVER: WINGOANALYST
    </div>
    
    <div class="timer" id="timer">00:00</div>
    
    <div class="signal-box">
        <div id="signal" class="signal-text" style="color: #444;">IDLE</div>
    </div>
    
    <div id="log">CONNECTING TO SOURCE...</div>
</div>

<script>
    async function getRealSignal() {
        const signalEl = document.getElementById('signal');
        const logEl = document.getElementById('log');
        const light = document.getElementById('light');

        logEl.innerText = "FETCHING DATA...";
        
        // Proxy using AllOrigins to bypass CORS
        const target = "https://wingoanalyst.com/#/wingo_1m";
        const url = `https://api.allorigins.win/get?url=${encodeURIComponent(target)}`;

        try {
            const response = await fetch(url);
            if (!response.ok) throw new Error("Network Error");
            
            const data = await response.json();
            const content = data.contents;

            // ডাটা রিড করার লজিক: সাইটের HTML এর ভেতর BIG বা SMALL খুঁজবে
            if (content.includes("BIG") || content.includes("SMALL")) {
                // এখানে সাইটের অরিজিনাল ডাটা পাওয়া গেলে সেটা দেখাবে
                // আমরা শুধু চেক করছি ডাটাটা স্ট্যাবল কি না
                const result = content.includes("BIG") ? "BIG" : "SMALL";
                
                signalEl.innerText = result;
                signalEl.style.color = (result === "BIG") ? "#ffcc00" : "#00ffcc";
                logEl.innerText = "REAL DATA RECEIVED";
                logEl.style.color = "#0f0";
            } else {
                throw new Error("No Signal Found");
            }
        } catch (err) {
            signalEl.innerText = "ERROR";
            signalEl.style.color = "#f00";
            logEl.innerText = "CANNOT READ SOURCE DATA";
            logEl.style.color = "#f00";
        }
    }

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const timeLeft = 60 - now.getSeconds();
            document.getElementById('timer').innerText = "00:" + (timeLeft < 10 ? "0" + timeLeft : timeLeft);
            
            // প্রতি মিনিটের শুরুতে নতুন ডাটা টানবে
            if (timeLeft === 59) {
                getRealSignal();
            }
        }, 1000);
    }

    getRealSignal();
    startTimer();
</script>

</body>
</html>
