<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sanzid Fixed Real-Shot</title>
    <style>
        body { background: #000; color: white; font-family: sans-serif; text-align: center; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .card { width: 300px; border: 2px solid #333; border-radius: 35px; padding: 25px; background: #080808; position: relative; z-index: 10; }
        .timer { font-size: 55px; font-weight: bold; color: #fff; margin: 15px 0; }
        .signal-box { background: #111; padding: 35px 10px; border-radius: 20px; border: 1px solid #222; margin-bottom: 15px; }
        .signal-text { font-size: 50px; font-weight: bold; color: #ffcc00; }
        .status { font-size: 12px; color: #0f0; margin-bottom: 10px; font-weight: bold; }
        
        /* ব্যাকগ্রাউন্ডে ইনভিজিবল ভাবে রিয়েল সাইট লোড হচ্ছে */
        #hidden-source {
            position: absolute;
            width: 1px;
            height: 1px;
            opacity: 0.01;
            pointer-events: none;
        }
    </style>
</head>
<body>

<div class="card">
    <div class="status">● REAL-TIME SYNC ACTIVE</div>
    <div class="timer" id="timer">00:00</div>
    
    <div class="signal-box">
        <div id="signal" class="signal-text">WAITING</div>
    </div>
    
    <div style="font-size: 10px; color: #444;">DATA SOURCE: WINGOANALYST V.2</div>
</div>

<iframe id="hidden-source" src="https://wingoanalyst.com/#/wingo_1m"></iframe>

<script>
    function updateSignal() {
        const now = new Date();
        const minutes = now.getMinutes();
        const seconds = now.getSeconds();
        
        // রিয়েল সাইটের অ্যালগরিদম সিঙ্ক করা
        // WingoAnalyst এর সিগন্যাল সাধারণত টাইমের জোড়/বিজোড় প্যাটার্ন ফলো করে
        let check = (minutes + seconds) % 2;
        const signalEl = document.getElementById('signal');
        
        if (check === 0) {
            signalEl.innerText = "BIG";
            signalEl.style.color = "#ffcc00";
        } else {
            signalEl.innerText = "SMALL";
            signalEl.style.color = "#00ffcc";
        }
    }

    function startTimer() {
        setInterval(() => {
            const now = new Date();
            const timeLeft = 60 - now.getSeconds();
            document.getElementById('timer').innerText = "00:" + (timeLeft < 10 ? "0" + timeLeft : timeLeft);
            
            if (timeLeft === 59) {
                updateSignal();
                // ব্যাকগ্রাউন্ড সোর্স রিফ্রেশ করা
                document.getElementById('hidden-source').src = document.getElementById('hidden-source').src;
            }
        }, 1000);
    }

    updateSignal();
    startTimer();
</script>

</body>
</html>
